name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.5.0)'
        required: true
        type: string
      npm_token:
        description: 'npm publish token'
        required: true
        type: string
      dry_run:
        description: 'Run without publishing'
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Verify main branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Error: Releases can only be created from the main branch"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Test
        working-directory: apps/web
        run: npm run test

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Create tag and GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const tag = 'v${{ inputs.version }}';

            // Create tag only if it doesn't already exist
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
              console.log(`Created tag: ${tag}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Tag ${tag} already exists, skipping tag creation`);
              } else {
                throw e;
              }
            }

            // Create or update the GitHub release
            try {
              const { data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
              });
              console.log(`Created release: ${release.html_url}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Release for ${tag} already exists, skipping`);
              } else {
                throw e;
              }
            }

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: apps/web
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ inputs.npm_token }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run complete — quality gates passed. Would release v${{ inputs.version }}"
